<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NETRUNNER WEB</title>
  <style>
    body {background:#0a0a0a; color:#00ff41; font-family: 'Courier New', monospace; margin:0; padding:20px;}
    h1 {margin:0 0 20px; font-size:1.8rem;}
    input, button {background:#111; color:#00ff41; border:1px solid #00ff41; padding:10px; font-family:inherit;}
    button {cursor:pointer;}
    button:hover {background:#00ff41; color:#000;}
    #log {background:#000; padding:15px; height:300px; overflow-y:auto; white-space:pre-wrap; font-size:0.9rem; border:1px solid #333; margin:20px 0;}
    #cmd {width:calc(100% - 22px); margin-top:10px;}
  </style>
</head>
<body>
  <h1>NETRUNNER V1 WEB</h1>
  
  <input id="token" type="password" placeholder="Paste token here (mfa. or regular)" autocomplete="off">
  <button onclick="connect()">CONNECT</button>
  
  <div id="log">Status: waiting for token...</div>
  
  <input id="cmd" placeholder="Type .help after connect" onkeypress="if(event.key==='Enter') runCommand(this.value)">
  
  <script src="https://unpkg.com/nosleep.js@0.12.0/dist/NoSleep.min.js"></script>
  <script src="selfbot.js"></script>
</body>
</html>
